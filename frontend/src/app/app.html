<app-navbar></app-navbar>
<router-outlet></router-outlet>

<div class="modal-sesion-backdrop" *ngIf="mostrarAvisoSesion">
  <div class="modal-sesion card card-custom">
    <div class="card-body p-4">
      <h2 class="h5 fw-bold mb-2">Tu sesión está por vencer</h2>
      <p class="text-muted mb-4">
        Quedan aproximadamente 5 minutos de sesión. Podés extenderla para seguir usando la aplicación.
      </p>

      <div class="d-flex justify-content-end gap-2">
        <button class="btn btn-outline-secondary" type="button" (click)="cerrarSesion()">
          Cerrar sesión
        </button>
        <button class="btn btn-primary" type="button" (click)="extenderSesion()" [disabled]="renovandoSesion">
          {{ renovandoSesion ? 'Renovando...' : 'Extender sesión' }}
        </button>
      </div>
    </div>
  </div>
</div>
