<div class="min-h-screen bg-slate-50 flex items-center justify-center p-4">
  <div class="w-full max-w-xl bg-white p-8 rounded-2xl shadow-lg border border-slate-200">
    <h1 class="text-2xl font-bold text-slate-800 mb-6">Crear Cuenta</h1>
    
    <form [formGroup]="registroForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <input formControlName="nombre" placeholder="Nombre" class="w-full p-2 border rounded border-slate-300">
        <input formControlName="apellido" placeholder="Apellido" class="w-full p-2 border rounded border-slate-300">
      </div>
      <input formControlName="nombreUsuario" placeholder="Usuario" class="w-full p-2 border rounded border-slate-300">
      <input formControlName="correo" type="email" placeholder="Correo" class="w-full p-2 border rounded border-slate-300">
      <div class="grid grid-cols-2 gap-4">
        <input formControlName="contrasena" type="password" placeholder="Contraseña" class="w-full p-2 border rounded border-slate-300">
        <input formControlName="repetirContrasena" type="password" placeholder="Confirmar" class="w-full p-2 border rounded border-slate-300">
      </div>
      <input type="date" formControlName="fechaNacimiento" class="w-full p-2 border rounded border-slate-300">
      <textarea formControlName="descripcionBreve" placeholder="Descripción breve" class="w-full p-2 border rounded border-slate-300"></textarea>
      <input type="file" (change)="onFileSelected($event)" class="w-full p-2 border rounded border-slate-300">

      <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded font-bold hover:bg-blue-700 transition">
        Registrarse
      </button>
    </form>
  </div>
</div>

<dialog #miModal class="p-8 rounded-xl shadow-2xl backdrop:bg-gray-800/50">
  <h2 class="text-xl font-bold mb-4">{{ modalTitulo }}</h2>
  <p class="text-slate-600 mb-6">{{ modalMensaje }}</p>
  <button (click)="cerrarModal()" class="w-full bg-slate-800 text-white py-2 rounded">Cerrar</button>
</dialog>
